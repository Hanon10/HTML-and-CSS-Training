<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sytle.css">
    <title>Document</title>
</head>

<body>
    <div class="main">
        <ul class="todo-list">
            <h1>My To-Do List</h1>
            <li>
                <input type="checkbox" id="course">
                <label for="course">Explore Course</label>
                <ul class="sub-item">
                    <li>
                        <a href="https://www.freecodecamp.org" target="_blank" class="sub-item-link">E-learning Website</a>
                    </li>
                </ul>
            </li>
            <li>
                <input type="checkbox" id="report">
                <label for="report">Finish Report</label>
                <ul class="sub-item">
                    <li>
                        <a href="https://www.freecodecamp.org" target="_blank" class="sub-item-link">Report Access</a>
                    </li>
                </ul>
            </li>
            <li>
                <input type="checkbox" id="acceptance">
                <label for="acceptance">Sign Acceptance</label>
                <ul class="sub-item">
                    <li>
                        <a href="https://www.freecodecamp.org" target="_blank" class="sub-item-link">Acceptance Access</a>
                    </li>
                </ul>
            </li>
            <li>
                <input type="checkbox" id="phone-charger">
                <label for="phone-charger">Explore Phone Charger</label>
                <ul class="sub-item">
                    <li>
                        <a href="https://www.freecodecamp.org" target="_blank" class="sub-item-link">Phone Store</a>
                    </li>
                </ul>
            </li>
        </ul>
    </div>
</body>

</html>
