<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Real Time Counter</title>
</head>
<body>

        <h1>Real-Time Character Counter</h1>

    </div>
    <script src="script.js"></script>
</body>
</html>
